# EVOSCZ — primary analysis environment (local macOS, Python 3.11)
# Produces the core manuscript numbers: variant master (phase11), within-locus
# correlations (phase13), GMM clustering (phase14b), iHS (scikit-allel),
# partitioned S-LDSC (phase14e/phase18, LDSC v1.0.1), figures.
#
# Versions captured 2026-06-28 with `conda env export` / `pip freeze`. They reflect the
# current state of the environment; minor versions of some packages may have been updated
# after the May 2026 analysis runs. LDSC v1.0.1 (run-log banner) and scikit-allel 1.3.13
# (matches the value recorded at analysis time) are confirmed. See SOFTWARE.md for the full
# environment -> phase mapping and the two TRUBA HPC environments (environments/).
name: evoscz
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11.15
  - numpy=1.26.4
  - bedtools=2.31.1
  - pip
  - pip:
      - pandas==2.3.3
      - scipy==1.16.3
      - scikit-learn==1.8.0
      - scikit-allel==1.3.13
      - statsmodels==0.14.6
      - pysam==0.24.0
      - pyliftover==0.4.1
# External tools (install separately; versions used):
#   plink2 v2.0.0-a.7.1
#   LDSC v1.0.1 — vendored in scripts/phase14e/ldsc/ (runs under Python 3)
#   Ensembl ancestral-allele FASTA, GRCh37 release-71 (iHS polarisation)
